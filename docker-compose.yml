# RelayCLI + optional services. Pick what you want with profiles:
#
#   docker compose run --rm relaycli                     # interactive agent
#   docker compose --profile web up -d                   # desktop UI on http://127.0.0.1:8484
#   docker compose --profile ollama up -d                # + local models
#   docker compose --profile postgres --profile n8n up -d
#
# Or install any of these yourself and skip the profile — RelayCLI only needs
# the URLs (OLLAMA_BASE_URL, DATABASE_URL) to point at your own instances.
# Recipes: docker/README.md

services:
  relaycli:
    build: .
    stdin_open: true          # the REPL is interactive
    tty: true
    working_dir: /workspace
    volumes:
      - ${RELAYCLI_WORKSPACE:-./workspace}:/workspace
      - relaycli-config:/home/relay/.relaycli
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      DATABASE_URL: ${DATABASE_URL:-postgresql://relay:${POSTGRES_PASSWORD:-relay}@postgres:5432/relay}

  relaycli-web:
    profiles: [web]
    build: .
    command: ["web", "--host", "0.0.0.0", "--port", "8484"]
    ports:
      - "127.0.0.1:8484:8484"   # host-side loopback keeps the agent private
    volumes:
      - ${RELAYCLI_WORKSPACE:-./workspace}:/workspace
      - relaycli-config:/home/relay/.relaycli
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}

  ollama:
    profiles: [ollama]
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"

  postgres:
    profiles: [postgres]
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-relay}
      POSTGRES_DB: relay
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  n8n:
    profiles: [n8n]
    image: n8nio/n8n:latest
    environment:
      N8N_SECURE_COOKIE: "false"   # plain http on loopback
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"

volumes:
  relaycli-config:
  ollama-models:
  pgdata:
  n8n-data:
